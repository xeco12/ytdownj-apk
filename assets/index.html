<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YTDown</title>
<style>
:root{--red:#FF0000;--red-light:#FFE5E5;--bg:#F8F8F8;--white:#fff;--text:#1C1C1E;--gray:#6B6B6B;--border:#E0E0E0;--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:sans-serif;background:var(--bg);min-height:100vh;padding:16px;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:8px;}
.logo{width:40px;height:40px;background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.logo svg{width:22px;height:22px;fill:white;}
.app-title{font-size:22px;font-weight:700;color:var(--text);}
.app-title span{color:var(--red);}
.card{background:white;border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.label{font-size:12px;color:var(--gray);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.input-row{display:flex;gap:8px;}
.url-input{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;}
.url-input:focus{border-color:var(--red);}
.fetch-btn{background:var(--red);color:white;border:none;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;}
.fetch-btn:disabled{opacity:0.5;}
.video-card{background:white;border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none;}
.video-card.show{display:block;}
.thumb{height:160px;background:linear-gradient(135deg,#1a1a2e,#533483);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.8);color:white;font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;}
.vmeta{padding:14px;}
.vtitle{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;}
.vch{font-size:12px;color:var(--gray);}
.tabs{display:flex;gap:8px;margin:12px 0;}
.tab{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;background:white;}
.tab.active{border-color:var(--red);background:var(--red-light);}
.tab-icon{font-size:18px;margin-bottom:3px;}
.tab-lbl{font-size:12px;font-weight:600;color:var(--gray);}
.tab.active .tab-lbl{color:var(--red);}
.qlabel{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.qrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.qrow::-webkit-scrollbar{display:none;}
.qpill{flex-shrink:0;border:1.5px solid var(--border);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;background:white;}
.qpill.active{border-color:var(--red);background:var(--red);color:white;}
.dl-btn{width:100%;background:var(--red);color:white;border:none;border-radius:var(--r);padding:16px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;box-shadow:0 4px 16px rgba(255,0,0,0.3);}
.dl-btn:disabled{opacity:0.5;}
.dl-btn svg{width:20px;height:20px;fill:white;}
.hint{text-align:center;font-size:12px;color:var(--gray);margin-bottom:14px;}
.status-card{background:white;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none;}
.status-card.show{display:block;}
.stitle{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;}
.pbar{height:6px;background:var(--bg);border-radius:100px;overflow:hidden;margin-bottom:8px;}
.pfill{height:100%;background:var(--red);border-radius:100px;width:0%;transition:width 0.3s;}
.stext{font-size:13px;color:var(--gray);}
.stext.ok{color:#2e7d32;font-weight:600;}
.stext.err{color:#c62828;font-weight:600;}
.link-card{background:white;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none;text-align:center;}
.link-card.show{display:block;}
.link-card p{font-size:14px;color:var(--text);margin-bottom:12px;font-weight:600;}
.open-btn{display:inline-block;background:var(--red);color:white;padding:14px 32px;border-radius:var(--r);font-size:15px;font-weight:700;text-decoration:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
</style>
</head>
<body>
<div class="header">
<div class="logo"><svg viewBox="0 0 24 24"><path d="M21.58 7.19a2.74 2.74 0 0 0-1.93-1.94C18 5 12 5 12 5s-6 0-7.65.25a2.74 2.74 0 0 0-1.93 1.94A28.37 28.37 0 0 0 2 12a28.37 28.37 0 0 0 .42 4.81 2.74 2.74 0 0 0 1.93 1.94C6 19 12 19 12 19s6 0 7.65-.25a2.74 2.74 0 0 0 1.93-1.94A28.37 28.37 0 0 0 22 12a28.37 28.37 0 0 0-.42-4.81zM10 15V9l5 3-5 3z"/></svg></div>
<span class="app-title">YT<span>Down</span></span>
</div>
<div class="card">
<div class="label">YouTube Baglantisi</div>
<div class="input-row">
<input class="url-input" id="urlInput" type="url" placeholder="https://youtube.com/watch?v=..."/>
<button class="fetch-btn" id="fetchBtn" onclick="fetchVideo()">Getir</button>
</div>
</div>
<div class="video-card" id="videoCard">
<div class="thumb" id="thumbArea"><div id="thumbPlaceholder" style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#533483);display:flex;align-items:center;justify-content:center;"><svg width="48" height="48" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)"><path d="M21.58 7.19a2.74 2.74 0 0 0-1.93-1.94C18 5 12 5 12 5s-6 0-7.65.25a2.74 2.74 0 0 0-1.93 1.94A28.37 28.37 0 0 0 2 12a28.37 28.37 0 0 0 .42 4.81 2.74 2.74 0 0 0 1.93 1.94C6 19 12 19 12 19s6 0 7.65-.25a2.74 2.74 0 0 0 1.93-1.94A28.37 28.37 0 0 0 22 12a28.37 28.37 0 0 0-.42-4.81zM10 15V9l5 3-5 3z"/></svg></div><span class="dur" id="durTag"></span></div>
<div class="vmeta">
<div class="vtitle" id="vTitle">Yukleniyor...</div>
<div class="vch" id="vCh"></div>
<div class="tabs">
<div class="tab active" onclick="selType(this,0)"><div class="tab-icon">🎬</div><div class="tab-lbl">Video</div></div>
<div class="tab" onclick="selType(this,1)"><div class="tab-icon">🎵</div><div class="tab-lbl">Muzik</div></div>
</div>
<div id="qwrap">
<div class="qlabel">Kalite</div>
<div class="qrow">
<div class="qpill active" onclick="selQ(this,'360p')">360p</div>
<div class="qpill" onclick="selQ(this,'480p')">480p</div>
<div class="qpill" onclick="selQ(this,'720p')">720p HD</div>
<div class="qpill" onclick="selQ(this,'1080p')">1080p FHD</div>
</div>
</div>
</div>
</div>
<button class="dl-btn" id="dlBtn" onclick="startDl()" style="display:none">
<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
<span id="dlTxt">Indir</span>
<div class="spinner" id="spin"></div>
</button>
<div class="hint" id="hint" style="display:none">Tahmini sure: ~30 saniye</div>
<div class="status-card" id="stCard">
<div class="stitle">Isleniyor...</div>
<div class="pbar"><div class="pfill" id="pfill"></div></div>
<div class="stext" id="stxt">Sunucuya baglaniliyor...</div>
</div>
<div class="link-card" id="lkCard">
<p>Hazir! Dosyayi indir:</p>
<a class="open-btn" id="lkBtn" href="#" target="_blank">Indir</a>
</div>
<script>
const KEY="0079c17643msh5d7a5c6dbfd266fp124a23jsn3473ddf73ae0";
const HOST="youtube-mp4-mp3-downloader.p.rapidapi.com";
let cType=0,cQ="360p",vId="";
function selType(el,t){cType=t;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));el.classList.add("active");const w=document.getElementById("qwrap");if(t===1){w.innerHTML='<div class="qlabel">Kalite</div><div class="qrow"><div class="qpill active" onclick="selQ(this,128)">128 kbps</div><div class="qpill" onclick="selQ(this,192)">192 kbps</div><div class="qpill" onclick="selQ(this,320)">320 kbps</div></div>';cQ=128;document.getElementById("dlTxt").textContent="MP3 Indir";}else{w.innerHTML='<div class="qlabel">Kalite</div><div class="qrow"><div class="qpill active" onclick="selQ(this,'360p')">360p</div><div class="qpill" onclick="selQ(this,'480p')">480p</div><div class="qpill" onclick="selQ(this,'720p')">720p HD</div><div class="qpill" onclick="selQ(this,'1080p')">1080p FHD</div></div>';cQ="360p";document.getElementById("dlTxt").textContent="MP4 Indir";}}
function selQ(el,q){el.closest(".qrow").querySelectorAll(".qpill").forEach(x=>x.classList.remove("active"));el.classList.add("active");cQ=q;}
function getVId(url){const m=url.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
async function fetchVideo(){
const url=document.getElementById("urlInput").value.trim();
if(!url){alert("Link gir!");return;}
vId=getVId(url);
if(!vId){alert("Gecersiz link!");return;}
const btn=document.getElementById("fetchBtn");
btn.textContent="...";btn.disabled=true;
try{
const r=await fetch("https://"+HOST+"/api/v1/info?id="+vId,{headers:{"x-rapidapi-key":KEY,"x-rapidapi-host":HOST}});
const d=await r.json();
document.getElementById("vTitle").textContent=d.title||"Video";
document.getElementById("vCh").textContent=d.channel||"";
if(d.thumbnail){document.getElementById("thumbArea").innerHTML='<img src="'+d.thumbnail+'" style="width:100%;height:100%;object-fit:cover"/><span class="dur" id="durTag">'+( d.duration||"")+'</span>';}
document.getElementById("videoCard").classList.add("show");
document.getElementById("dlBtn").style.display="flex";
document.getElementById("hint").style.display="block";
document.getElementById("lkCard").classList.remove("show");
}catch(e){alert("Hata: "+e.message);}
btn.textContent="Getir";btn.disabled=false;}
async function startDl(){
const btn=document.getElementById("dlBtn");
const sp=document.getElementById("spin");
const sc=document.getElementById("stCard");
const pf=document.getElementById("pfill");
const st=document.getElementById("stxt");
btn.disabled=true;sp.style.display="block";sc.classList.add("show");
document.getElementById("lkCard").classList.remove("show");
let p=0;const pi=setInterval(()=>{p=Math.min(p+Math.random()*8,85);pf.style.width=p+"%";},400);
try{
const ep=cType===1?"mp3":"mp4";
const params=cType===1?"id="+vId+"&quality="+cQ:"id="+vId+"&quality="+cQ;
st.textContent=cType===1?"MP3 donusturuluyor...":"MP4 hazirlaniyor...";
const r=await fetch("https://"+HOST+"/api/v1/"+ep+"?"+params,{headers:{"x-rapidapi-key":KEY,"x-rapidapi-host":HOST}});
const d=await r.json();
clearInterval(pi);pf.style.width="100%";
const dlUrl=d.url||d.downloadUrl||d.link||null;
if(dlUrl){
st.textContent="Tamamlandi!";st.className="stext ok";
document.getElementById("lkBtn").href=dlUrl;
document.getElementById("lkCard").classList.add("show");
window.open(dlUrl,"_blank");
}else if(d.id){
await checkProg(d.id);
}else{throw new Error("Indirme linki alinamadi. Yanit: "+JSON.stringify(d));}
}catch(e){clearInterval(pi);st.textContent="Hata: "+e.message;st.className="stext err";}
btn.disabled=false;sp.style.display="none";}
async function checkProg(jid){
const pf=document.getElementById("pfill");
const st=document.getElementById("stxt");
for(let i=0;i<20;i++){
await new Promise(r=>setTimeout(r,3000));
try{
const r=await fetch("https://"+HOST+"/api/v1/progress?id="+jid,{headers:{"x-rapidapi-key":KEY,"x-rapidapi-host":HOST}});
const d=await r.json();
if(d.progress)pf.style.width=d.progress+"%";
const dlUrl=d.url||d.downloadUrl||null;
if(dlUrl){st.textContent="Tamamlandi!";st.className="stext ok";pf.style.width="100%";document.getElementById("lkBtn").href=dlUrl;document.getElementById("lkCard").classList.add("show");window.open(dlUrl,"_blank");return;}
if(d.status==="failed")throw new Error("Donusturme basarisiz");
st.textContent="Isleniyor... ("+(d.progress||"")+"%)";
}catch(e){st.textContent="Hata: "+e.message;st.className="stext err";return;}}
st.textContent="Zaman asimi. Tekrar dene.";st.className="stext err";}
</script>
</body>
</html>
